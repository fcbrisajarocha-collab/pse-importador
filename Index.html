function L(m){const e=document.getElementById('log');e.textContent+=m+'
';e.scrollTop=e.scrollHeight;}

function toFS(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(toFS)}};
  if(typeof v==='object'){const f={};Object.keys(v).forEach(k=>f[k]=toFS(v[k]));return{mapValue:{fields:f}};}
  return{stringValue:String(v)};
}
function oFS(o){const f={};Object.keys(o).forEach(k=>f[k]=toFS(o[k]));return{fields:f};}
function fFS(fv){
  if(!fv)return null;
  if('nullValue'in fv)return null;
  if('booleanValue'in fv)return fv.booleanValue;
  if('integerValue'in fv)return Number(fv.integerValue);
  if('doubleValue'in fv)return Number(fv.doubleValue);
  if('stringValue'in fv)return fv.stringValue;
  if('arrayValue'in fv){const v=fv.arrayValue?.values;return Array.isArray(v)?v.map(fFS):[];}
  if('mapValue'in fv){const o={},f=fv.mapValue?.fields||{};Object.keys(f).forEach(k=>o[k]=fFS(f[k]));return o;}
  return null;
}

async function verificar(){
  document.getElementById('bv').disabled=true;
  L('
🔍 Verificando Firebase PSE...');
  try{
    const r=await fetch(URL);
    if(r.status===404){L('✓ PSE vacío — OK para importar');return;}
    if(!r.ok){L('✗ HTTP '+r.status);return;}
    const d=await r.json();
    const ses=fFS(d.fields?.sessions)||[];
    const cat=fFS(d.fields?.catalog)||[];
    L('Estado actual: '+ses.length+' sesiones | '+cat.length+' colaboradores');
    if(ses.length>0){
      const dates=[...new Set(ses.map(s=>s.date))].sort();
      L('Fechas: '+dates[0]+' → '+dates[dates.length-1]);
      ses.forEach(s=>L('  '+s.date+' T'+s.turno+' | '+s.supervisor+' | '+s.team.length+' regs'));
      L('⚠️  Datos existentes se combinarán sin duplicar IDs');
    }else{L('✓ Vacío — listo para importar');}
  }catch(e){L('✗ Error: '+e.message);}
  finally{document.getElementById('bv').disabled=false;}
}

async function importar(){
  if(!confirm('¿Confirmar importación del histórico PSE a Firebase?'))return;
  document.getElementById('bi').disabled=true;
  L('
⬆ Iniciando importación...');
  try{
    // 1. Leer estado actual
    L('1/3 Leyendo Firebase...');
    let eS=[],eC=[];
    const r=await fetch(URL);
    if(r.ok){
      const d=await r.json();
      eS=fFS(d.fields?.sessions)||[];
      eC=fFS(d.fields?.catalog)||[];
      L('    Existente: '+eS.length+' ses | '+eC.length+' col');
    }else if(r.status!==404){throw new Error('HTTP '+r.status);}

    // 2. Combinar sin duplicar por ID
    L('2/3 Combinando sin duplicados...');
    const eSI=new Set(eS.map(s=>s.id));
    const eCI=new Set(eC.map(c=>c.id));
    const nS=DATA.sessions.filter(s=>!eSI.has(s.id));
    const nC=DATA.catalog.filter(c=>!eCI.has(c.id));
    const mS=[...eS,...nS];
    const mC=[...eC,...nC];
    L('    Nuevas sesiones: '+nS.length+' | Nuevos colaboradores: '+nC.length);
    L('    Total: '+mS.length+' ses | '+mC.length+' col');

    // 3. Verificar datos antes de subir
    const totalRegs=nS.reduce((a,s)=>a+s.team.length,0);
    L('    Registros en sesiones nuevas: '+totalRegs);
    if(totalRegs===0){L('⚠️  Advertencia: 0 registros en sesiones nuevas');}

    // 4. Subir
    L('3/3 Subiendo a Firebase...');
    const snap={version:1,ts:Date.now(),catalog:mC,sessions:mS};
    const keys=Object.keys(snap).map(k=>'updateMask.fieldPaths='+k).join('&');
    const pUrl=URL.replace('?key=','?'+keys+'&key=');
    const res=await fetch(pUrl,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(oFS(snap))});
    if(!res.ok){const t=await res.text();throw new Error('HTTP '+res.status+': '+t.substring(0,300));}

    L('
✅ ¡IMPORTACIÓN EXITOSA!');
    L('   '+nS.length+' sesiones nuevas cargadas');
    L('   '+totalRegs+' registros de asistencia importados');
    L('   '+nC.length+' colaboradores agregados al catálogo');
    L('
   Abre el Panel Gerencial → filtro PSE para ver los datos.');
    L('   O abre el sistema PSE directamente.');

  }catch(e){
    L('
✗ ERROR: '+e.message);
    L('   Verifica tu conexión e intenta de nuevo.');
  }finally{
    document.getElementById('bi').disabled=false;
  }
}
