function L(m){var e=document.getElementById("log");e.textContent+=m+"\n";e.scrollTop=e.scrollHeight;}
function toFS(v){if(v===null||v===undefined)return{nullValue:null};if(typeof v==="boolean")return{booleanValue:v};if(typeof v==="number")return{doubleValue:v};if(typeof v==="string")return{stringValue:v};if(Array.isArray(v))return{arrayValue:{values:v.map(toFS)}};if(typeof v==="object"){var f={};Object.keys(v).forEach(function(k){f[k]=toFS(v[k])});return{mapValue:{fields:f}}}return{stringValue:String(v)};}
function oFS(o){var f={};Object.keys(o).forEach(function(k){f[k]=toFS(o[k])});return{fields:f};}
function fFS(fv){if(!fv)return null;if("nullValue"in fv)return null;if("booleanValue"in fv)return fv.booleanValue;if("integerValue"in fv)return Number(fv.integerValue);if("doubleValue"in fv)return Number(fv.doubleValue);if("stringValue"in fv)return fv.stringValue;if("arrayValue"in fv){var v=fv.arrayValue&&fv.arrayValue.values;return Array.isArray(v)?v.map(fFS):[]}if("mapValue"in fv){var o={},f=fv.mapValue.fields||{};Object.keys(f).forEach(function(k){o[k]=fFS(f[k])});return o}return null;}

function verificar(){
  document.getElementById("bv").disabled=true;
  L("Verificando Firebase PSE...");
  fetch(U).then(function(r){
    if(r.status===404){L("OK - Firebase PSE vacio, listo para importar");return;}
    return r.json().then(function(d){
      var s=fFS(d.fields&&d.fields.sessions)||[];
      var c=fFS(d.fields&&d.fields.catalog)||[];
      L("Estado actual: "+s.length+" sesiones, "+c.length+" colaboradores");
      if(s.length>0){var dates=[...new Set(s.map(function(x){return x.date}))].sort();L("Fechas: "+dates[0]+" a "+dates[dates.length-1]);L("ADVERTENCIA: se combinaran sin duplicar");}
      else{L("Vacio - OK para importar");}
    });
  }).catch(function(e){L("Error: "+e.message);}).finally(function(){document.getElementById("bv").disabled=false;});
}
function importar(){
  if(!confirm("Confirmar importacion del historico PSE?"))return;
  document.getElementById("bi").disabled=true;
  L("Iniciando importacion...");
  fetch(U).then(function(r){
    var eS=[],eC=[];
    if(r.ok){return r.json().then(function(d){eS=fFS(d.fields&&d.fields.sessions)||[];eC=fFS(d.fields&&d.fields.catalog)||[];return{eS:eS,eC:eC};});}
    return{eS:[],eC:[]};
  }).then(function(ex){
    var eS=ex.eS||[],eC=ex.eC||[];
    L("Existente: "+eS.length+" ses, "+eC.length+" col");
    var eSI=new Set(eS.map(function(s){return s.id}));
    var eCI=new Set(eC.map(function(c){return c.id}));
    var nS=D.sessions.filter(function(s){return!eSI.has(s.id)});
    var nC=D.catalog.filter(function(c){return!eCI.has(c.id)});
    var mS=eS.concat(nS),mC=eC.concat(nC);
    L("Nuevas: "+nS.length+" ses, "+nC.length+" col");
    L("Registros en sesiones nuevas: "+nS.reduce(function(a,s){return a+s.team.length},0));
    var snap={version:1,ts:Date.now(),catalog:mC,sessions:mS};
    var keys=Object.keys(snap).map(function(k){return"updateMask.fieldPaths="+k}).join("&");
    var pu=U.replace("?key=","?"+keys+"&key=");
    return fetch(pu,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(oFS(snap))});
  }).then(function(res){
    if(!res.ok){return res.text().then(function(t){throw new Error("HTTP "+res.status+": "+t.substring(0,200));});}
    L("EXITO! Importacion completada.");
    L("Abre el Panel Gerencial -> PSE para ver los datos.");
  }).catch(function(e){L("ERROR: "+e.message);}).finally(function(){document.getElementById("bi").disabled=false;});
}
